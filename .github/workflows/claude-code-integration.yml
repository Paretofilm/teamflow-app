name: Claude Code Integration

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened, edited]

jobs:
  claude-integration:
    if: github.event.comment.body == '@claude implement this feature' || github.event.comment.body == '@claude' || contains(github.event.comment.body, '@claude implement')
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      issues: write
      pull-requests: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Setup Claude Code
        run: |
          # Install Claude Code CLI
          npm install -g @anthropic/claude-code
          
      - name: Get issue details
        id: issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            return {
              number: issue.number,
              title: issue.title,
              body: issue.body,
              url: issue.html_url
            };
            
      - name: Create feature branch
        run: |
          BRANCH_NAME="feature/issue-${{ fromJson(steps.issue.outputs.result).number }}"
          git checkout -b $BRANCH_NAME
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          
      - name: Run Claude Code implementation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create implementation prompt based on issue
          echo "Implement the feature described in issue #${{ fromJson(steps.issue.outputs.result).number }}" > .claude/implementation-prompt.txt
          echo "" >> .claude/implementation-prompt.txt
          echo "Issue Title: ${{ fromJson(steps.issue.outputs.result).title }}" >> .claude/implementation-prompt.txt
          echo "" >> .claude/implementation-prompt.txt
          echo "Issue Description:" >> .claude/implementation-prompt.txt
          echo "${{ fromJson(steps.issue.outputs.result).body }}" >> .claude/implementation-prompt.txt
          
          # Run Claude Code with the implementation prompt
          claude-code --prompt "$(cat .claude/implementation-prompt.txt)" --auto-commit --branch $BRANCH_NAME
          
      - name: Create Pull Request
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: pullRequest } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Implementation: ${{ fromJson(steps.issue.outputs.result).title }}`,
              head: process.env.BRANCH_NAME,
              base: 'main',
              body: `
            ## Implementation Complete
            
            This PR implements the feature requested in issue #${{ fromJson(steps.issue.outputs.result).number }}.
            
            **Original Issue**: ${{ fromJson(steps.issue.outputs.result).url }}
            
            **Auto-generated by**: Claude Code GitHub Actions
            
            ### Changes Made
            - Implemented feature as described in the issue
            - Added necessary dependencies
            - Created required components and configurations
            - Followed deployment-aware development patterns
            
            ### Next Steps
            - Review the implementation
            - Test the feature functionality
            - Merge when ready
            
            Closes #${{ fromJson(steps.issue.outputs.result).number }}
            `
            });
            
            // Comment on the original issue
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ fromJson(steps.issue.outputs.result).number }},
              body: `🤖 **Implementation Started**
              
              Claude Code is implementing this feature! 
              
              **Pull Request**: #${pullRequest.number}
              **Branch**: \`${process.env.BRANCH_NAME}\`
              
              The implementation will be ready for review shortly.`
            });
            
      - name: Update issue with completion
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ fromJson(steps.issue.outputs.result).number }},
              body: `✅ **Implementation Complete**
              
              The feature has been implemented and is ready for review!
              
              **Review the changes**: Check the pull request for implementation details
              **Test the feature**: Verify functionality works as expected
              **Deploy**: Merge the PR when ready
              
              🚀 Deployment-aware development complete!`
            });