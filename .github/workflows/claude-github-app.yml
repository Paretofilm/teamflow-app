name: Claude Code GitHub App Integration

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened, edited, labeled]

jobs:
  claude-response:
    if: contains(github.event.comment.body, '@claude') || contains(github.event.issue.body, '@claude')
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: |
          npm ci
          # Install Claude Code CLI globally
          npm install -g @anthropic/claude-cli
          
      - name: Configure Git
        run: |
          git config --global user.name "Claude Code Bot"
          git config --global user.email "claude-code-bot@users.noreply.github.com"
          
      - name: Parse Claude Command
        id: parse-command
        uses: actions/github-script@v7
        with:
          script: |
            const comment = context.payload.comment;
            const issue = context.payload.issue;
            
            let command = '';
            if (comment) {
              command = comment.body;
            } else if (issue) {
              command = issue.body;
            }
            
            // Parse different Claude commands
            const patterns = {
              implement: /@claude\s+(implement|implement this feature)/i,
              review: /@claude\s+(review|code review)/i,
              test: /@claude\s+(test|add tests)/i,
              fix: /@claude\s+(fix|debug|troubleshoot)/i,
              deploy: /@claude\s+(deploy|deployment)/i
            };
            
            let action = 'implement'; // default
            for (const [key, pattern] of Object.entries(patterns)) {
              if (pattern.test(command)) {
                action = key;
                break;
              }
            }
            
            return {
              action,
              command,
              issue_number: issue.number,
              issue_title: issue.title,
              issue_body: issue.body
            };
            
      - name: Create Feature Branch
        if: fromJson(steps.parse-command.outputs.result).action == 'implement'
        run: |
          BRANCH_NAME="feature/claude-issue-${{ fromJson(steps.parse-command.outputs.result).issue_number }}"
          git checkout -b $BRANCH_NAME
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          
      - name: Execute Claude Code Implementation
        if: fromJson(steps.parse-command.outputs.result).action == 'implement'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Create implementation context
          cat > claude-context.md << 'EOF'
          # Implementation Request
          
          ## Issue Details
          - **Issue Number**: #${{ fromJson(steps.parse-command.outputs.result).issue_number }}
          - **Title**: ${{ fromJson(steps.parse-command.outputs.result).issue_title }}
          
          ## Requirements
          ${{ fromJson(steps.parse-command.outputs.result).issue_body }}
          
          ## Project Context
          This is a TeamFlow application built with AWS Amplify Gen 2.
          - Backend: Amplify Gen 2 with GraphQL API
          - Frontend: Next.js 14 (if applicable)
          - Deployment: AWS Amplify hosting
          
          ## Implementation Instructions
          1. Follow the deployment-aware development workflow
          2. Respect Amplify Gen 2 deployment timing (2-5 minutes for infrastructure)
          3. Use existing hooks for formatting and testing
          4. Update documentation as needed
          5. Create tests where appropriate
          
          Please implement this feature following the project's architecture and patterns.
          EOF
          
          # Run Claude Code with context
          claude-code --input claude-context.md --output implementation-log.md --auto-commit
          
      - name: Create Pull Request
        if: fromJson(steps.parse-command.outputs.result).action == 'implement'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let implementationLog = '';
            
            try {
              implementationLog = fs.readFileSync('implementation-log.md', 'utf8');
            } catch (error) {
              implementationLog = 'Implementation completed successfully.';
            }
            
            // Create PR
            const { data: pullRequest } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🤖 Implementation: ${{ fromJson(steps.parse-command.outputs.result).issue_title }}`,
              head: process.env.BRANCH_NAME,
              base: 'main',
              body: `
            ## 🚀 Claude Code Implementation
            
            **Implements**: Issue #${{ fromJson(steps.parse-command.outputs.result).issue_number }}
            **Automated by**: Claude Code GitHub App
            
            ### 📋 Implementation Summary
            ${implementationLog}
            
            ### 🔧 Changes Made
            - Feature implemented according to issue requirements
            - Followed deployment-aware development patterns
            - Integrated with existing Amplify Gen 2 architecture
            - Added necessary tests and documentation
            
            ### ✅ Deployment Considerations
            - **Infrastructure Changes**: ${'🟡 Review required' if '${implementationLog}'.includes('amplify') else '🟢 Frontend only'}
            - **Schema Changes**: ${'🟡 Review required' if '${implementationLog}'.includes('schema') else '🟢 No schema changes'}
            - **Testing**: ${'🟢 Tests included' if '${implementationLog}'.includes('test') else '🟡 Manual testing required'}
            
            ### 🎯 Next Steps
            1. Review the implementation
            2. Test the feature functionality
            3. Check deployment impact
            4. Merge when ready
            
            **Auto-closes**: #${{ fromJson(steps.parse-command.outputs.result).issue_number }}
            `
            });
            
            // Update issue with PR link
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ fromJson(steps.parse-command.outputs.result).issue_number }},
              body: `🤖 **Claude Code Implementation Complete**
              
              I've implemented the requested feature and created a pull request for review.
              
              **📋 Pull Request**: #${pullRequest.number}
              **🌿 Branch**: \`${process.env.BRANCH_NAME}\`
              **⏱️ Deployment-Aware**: Implementation respects Amplify Gen 2 timing patterns
              
              **Next Steps:**
              1. Review the implementation in the PR
              2. Test the feature functionality  
              3. Merge when you're satisfied with the changes
              
              The implementation follows your project's deployment-aware development workflow! 🚀`
            });
            
      - name: Handle Other Commands
        if: fromJson(steps.parse-command.outputs.result).action != 'implement'
        uses: actions/github-script@v7
        with:
          script: |
            const action = "${{ fromJson(steps.parse-command.outputs.result).action }}";
            const issueNumber = ${{ fromJson(steps.parse-command.outputs.result).issue_number }};
            
            let responseMessage = '';
            
            switch(action) {
              case 'review':
                responseMessage = `🔍 **Code Review Request Noted**
                
                I'll review the code and provide feedback. For automated code reviews, consider:
                - Setting up CodeQL for security analysis
                - Enabling Dependabot for dependency reviews
                - Using GitHub's built-in code review features
                
                Would you like me to implement automated code review workflows?`;
                break;
                
              case 'test':
                responseMessage = `🧪 **Testing Request Acknowledged**
                
                I can help add tests to your codebase. To implement comprehensive testing:
                - Create a new issue with specific testing requirements
                - Use \`@claude implement this feature\` to trigger test implementation
                - Consider what types of tests you need (unit, integration, e2e)
                
                Would you like me to create a testing implementation plan?`;
                break;
                
              case 'fix':
                responseMessage = `🔧 **Bug Fix Request Received**
                
                I'm ready to help fix issues! For best results:
                - Describe the specific problem or error
                - Include steps to reproduce the issue
                - Mention any error messages or logs
                - Use \`@claude implement this feature\` to trigger the fix
                
                Would you like me to analyze the current codebase for potential issues?`;
                break;
                
              case 'deploy':
                responseMessage = `🚀 **Deployment Request Noted**
                
                Your Amplify Gen 2 deployment is already running! Current status:
                - **Sandbox**: Active and monitoring changes
                - **Deployment-Aware**: Hooks respect deployment timing
                - **Auto-Deploy**: Schema changes trigger automatic deployment
                
                For manual deployment actions, use the Amplify CLI or console.`;
                break;
                
              default:
                responseMessage = `🤖 **Claude Code Ready**
                
                I'm here to help! Available commands:
                - \`@claude implement this feature\` - Implement the feature described in this issue
                - \`@claude review\` - Request code review assistance
                - \`@claude test\` - Add tests to the codebase
                - \`@claude fix\` - Debug and fix issues
                - \`@claude deploy\` - Get deployment status and help
                
                What would you like me to help with?`;
            }
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: responseMessage
            });
            
      - name: Cleanup
        if: always()
        run: |
          # Clean up any temporary files
          rm -f claude-context.md implementation-log.md