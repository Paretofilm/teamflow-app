name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read
          
          # Optional: Specify model (defaults to Claude Sonnet 4, uncomment for Claude Opus 4)
          # model: "claude-opus-4-20250514"
          
          # Optional: Customize the trigger phrase (default: @claude)
          # trigger_phrase: "/claude"
          
          # Optional: Trigger when specific user is assigned to an issue
          # assignee_trigger: "claude-bot"
          
          # Allow Claude to run Amplify and development commands
          allowed_tools: "Bash(npm install),Bash(npm run build),Bash(npm run test:*),Bash(npm run lint:*),Bash(npx amplify *),Bash(npx ampx *)"
          
          # Custom instructions for TeamFlow Amplify Gen 2 project
          custom_instructions: |
            This is a TeamFlow application built with AWS Amplify Gen 2. Please follow these guidelines:
            
            DEPLOYMENT AWARENESS:
            - Infrastructure changes take 2-5 minutes to deploy
            - Schema changes trigger automatic type regeneration
            - Frontend changes can proceed immediately
            - Always check deployment status before major changes
            
            AMPLIFY GEN 2 PATTERNS:
            - Use existing auth/resource.ts and data/resource.ts files
            - Follow the established backend structure in amplify/ directory
            - Respect the deployment-aware development workflow
            - Use TypeScript for all new files
            
            ORGANIZATION:
            - This is a Paretofilm organization project
            - Target dev branch for development workflow
            - Follow existing project structure and conventions
            - Ensure all new code has appropriate tests
            
            COMMANDS:
            - Use npx ampx sandbox for deployment
            - Use npx amplify generate for type generation
            - Respect existing hooks for formatting and testing
          
          # Target dev branch for development workflow
          base_branch: "dev"
          
          # Custom environment variables for Amplify Gen 2
          claude_env: |
            NODE_ENV: development
            AMPLIFY_ENV: sandbox

